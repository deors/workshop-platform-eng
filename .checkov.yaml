# Checkov configuration for Terraform – Azure Web App (container-based)
# Docs: https://www.checkov.io/2.Basics/CLI%20Command%20Reference.html

# Enforce hard-fail by default; CI passes --soft-fail=false explicitly.
# To permit a new check during a migration, add it here with a comment
# explaining why and a tracking issue reference.

compact: false

skip-check:
  # ── Language-version checks – not applicable for container deployments ──────
  - CKV_AZURE_80   # PHP version: managed by the container image, not the App Service runtime
  - CKV_AZURE_81   # Python version: same rationale
  - CKV_AZURE_82   # Java version: same rationale
  - CKV_AZURE_84   # .NET version: same rationale

  # ── Azure Files storage – not applicable for stateless containers ───────────
  - CKV_AZURE_88   # "Ensure App Service uses Azure Files": containers are stateless; no persistent mount needed

  # ── Temporarily skipped globally — TODO: revisit and fix or document permanently ─
  - CKV_AZURE_13   # App Service Authentication (Easy Auth): TODO enable in webapp module if app requires it
  - CKV_AZURE_17   # Client certificates (mTLS): TODO enable or document non-applicability
  - CKV_AZURE_222  # Public network access disabled: TODO staging has no private endpoint; revisit when private endpoint is enabled per-env

  # ── CKV_AZURE_212 and CKV_AZURE_225 are NOT skipped here — they must pass for prod.
  # Non-prod environments use .checkov.nonprod.yaml which extends this list with
  # those two checks (zone redundancy and ≥2 instance baseline are prod-only).
