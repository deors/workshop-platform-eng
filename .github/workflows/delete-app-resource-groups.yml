name: Delete App Resource Groups

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: Application name used in resource group names
        type: string
        required: true
      azure_tenant_id:
        description: Azure Tenant ID
        type: string
        required: true
      azure_subscription_id:
        description: Azure Subscription ID
        type: string
        required: true
      azure_client_id:
        description: Client ID of the Azure service principal / managed identity used for OIDC login
        type: string
        required: true
      confirmation_app_name:
        description: Repeat the exact app_name to confirm destructive deletion
        type: string
        required: true
      wait_for_completion:
        description: Wait until Azure confirms all resource groups are fully deleted
        type: choice
        options: ["true", "false"]
        default: "true"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  delete-app-resource-groups:
    name: Delete app resource groups
    runs-on: ubuntu-latest

    steps:
      - name: Validate inputs
        id: validate
        env:
          APP_NAME:              ${{ github.event.inputs.app_name }}
          CONFIRMATION_APP_NAME: ${{ github.event.inputs.confirmation_app_name }}
          WAIT_FOR_COMPLETION:   ${{ github.event.inputs.wait_for_completion }}
        run: |
          set -euo pipefail

          MISSING=()
          [[ -z "$APP_NAME"              ]] && MISSING+=(app_name)
          [[ -z "$CONFIRMATION_APP_NAME" ]] && MISSING+=(confirmation_app_name)
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Missing required parameters: ${MISSING[*]}"
            exit 1
          fi

          if [[ "$APP_NAME" != "$CONFIRMATION_APP_NAME" ]]; then
            echo "::error::confirmation_app_name must exactly match app_name"
            exit 1
          fi

          if [[ "$WAIT_FOR_COMPLETION" != "true" && "$WAIT_FOR_COMPLETION" != "false" ]]; then
            echo "::error::wait_for_completion must be either true or false"
            exit 1
          fi

          if ! [[ "$APP_NAME" =~ ^[a-z0-9][a-z0-9-]{1,20}[a-z0-9]$ ]]; then
            echo "::error::app_name must be 3-22 chars, lowercase alphanumeric and hyphens, no leading/trailing hyphen"
            exit 1
          fi

          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "wait_for_completion=$WAIT_FOR_COMPLETION" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          tenant-id:       ${{ github.event.inputs.azure_tenant_id }}
          subscription-id: ${{ github.event.inputs.azure_subscription_id }}
          client-id:       ${{ github.event.inputs.azure_client_id }}

      - name: Delete all app resource groups
        env:
          APP_NAME:            ${{ steps.validate.outputs.app_name }}
          WAIT_FOR_COMPLETION: ${{ steps.validate.outputs.wait_for_completion }}
        run: |
          set -euo pipefail

          TARGETS=(
            "rg-${APP_NAME}-dev"
            "rg-${APP_NAME}-staging"
            "rg-${APP_NAME}-prod"
            "rg-tfstate-${APP_NAME}"
          )

          EXISTING=()
          MISSING=()

          for rg in "${TARGETS[@]}"; do
            if [[ "$(az group exists --name "$rg")" == "true" ]]; then
              echo "Deleting resource group '$rg'..."
              az group delete --name "$rg" --yes --no-wait
              EXISTING+=("$rg")
            else
              echo "Resource group '$rg' does not exist."
              MISSING+=("$rg")
            fi
          done

          if [[ "$WAIT_FOR_COMPLETION" == "true" && ${#EXISTING[@]} -gt 0 ]]; then
            for rg in "${EXISTING[@]}"; do
              echo "Waiting for deletion of '$rg'..."
              az group wait --name "$rg" --deleted --interval 15
            done
            STATUS="Deleted"
          elif [[ ${#EXISTING[@]} -gt 0 ]]; then
            STATUS="Delete requested (async)"
          else
            STATUS="No target resource groups found"
          fi

          {
            echo "## Delete App Resource Groups"
            echo ""
            echo "- App name: $APP_NAME"
            echo "- Status: $STATUS"
            echo ""
            echo "### Target resource groups"
            echo "- rg-${APP_NAME}-dev"
            echo "- rg-${APP_NAME}-staging"
            echo "- rg-${APP_NAME}-prod"
            echo "- rg-tfstate-${APP_NAME}"
            echo ""
            echo "### Deletion requested for"
            if [[ ${#EXISTING[@]} -gt 0 ]]; then
              for rg in "${EXISTING[@]}"; do
                echo "- $rg"
              done
            else
              echo "- none"
            fi
            echo ""
            echo "### Not found"
            if [[ ${#MISSING[@]} -gt 0 ]]; then
              for rg in "${MISSING[@]}"; do
                echo "- $rg"
              done
            else
              echo "- none"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
