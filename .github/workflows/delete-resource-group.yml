name: Delete App Resource Group (Single environment)

on:
  workflow_dispatch:
    inputs:
      resource_group_name:
        description: Azure Resource Group name to delete
        type: string
        required: true
      azure_tenant_id:
        description: Azure Tenant ID
        type: string
        required: true
      azure_subscription_id:
        description: Azure Subscription ID
        type: string
        required: true
      azure_client_id:
        description: Client ID of the Azure service principal / managed identity used for OIDC login
        type: string
        required: true
      confirmation_resource_group_name:
        description: Repeat the exact resource group name to confirm destructive deletion
        type: string
        required: true
      wait_for_completion:
        description: Wait until Azure confirms the resource group is fully deleted
        type: choice
        options: ["true", "false"]
        default: "true"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  delete-resource-group:
    name: Delete resource group
    runs-on: ubuntu-latest

    steps:
      - name: Validate inputs
        id: validate
        env:
          RESOURCE_GROUP_NAME:              ${{ github.event.inputs.resource_group_name }}
          CONFIRMATION_RESOURCE_GROUP_NAME: ${{ github.event.inputs.confirmation_resource_group_name }}
          WAIT_FOR_COMPLETION:              ${{ github.event.inputs.wait_for_completion }}
        run: |
          set -euo pipefail

          MISSING=()
          [[ -z "$RESOURCE_GROUP_NAME"              ]] && MISSING+=(resource_group_name)
          [[ -z "$CONFIRMATION_RESOURCE_GROUP_NAME" ]] && MISSING+=(confirmation_resource_group_name)
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Missing required parameters: ${MISSING[*]}"
            exit 1
          fi

          if [[ "$RESOURCE_GROUP_NAME" != "$CONFIRMATION_RESOURCE_GROUP_NAME" ]]; then
            echo "::error::confirmation_resource_group_name must exactly match resource_group_name"
            exit 1
          fi

          if [[ "$WAIT_FOR_COMPLETION" != "true" && "$WAIT_FOR_COMPLETION" != "false" ]]; then
            echo "::error::wait_for_completion must be either true or false"
            exit 1
          fi

          echo "resource_group_name=$RESOURCE_GROUP_NAME" >> "$GITHUB_OUTPUT"
          echo "wait_for_completion=$WAIT_FOR_COMPLETION" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          tenant-id:       ${{ github.event.inputs.azure_tenant_id }}
          subscription-id: ${{ github.event.inputs.azure_subscription_id }}
          client-id:       ${{ github.event.inputs.azure_client_id }}

      - name: Delete resource group
        env:
          RESOURCE_GROUP_NAME: ${{ steps.validate.outputs.resource_group_name }}
          WAIT_FOR_COMPLETION: ${{ steps.validate.outputs.wait_for_completion }}
        run: |
          set -euo pipefail

          if [[ "$(az group exists --name "$RESOURCE_GROUP_NAME")" != "true" ]]; then
            echo "Resource group '$RESOURCE_GROUP_NAME' does not exist. Nothing to delete."
            {
              echo "## Delete Resource Group"
              echo ""
              echo "Resource group '$RESOURCE_GROUP_NAME' was not found."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "Deleting resource group '$RESOURCE_GROUP_NAME'..."
          az group delete --name "$RESOURCE_GROUP_NAME" --yes --no-wait

          if [[ "$WAIT_FOR_COMPLETION" == "true" ]]; then
            echo "Waiting for deletion to complete..."
            az group wait --name "$RESOURCE_GROUP_NAME" --deleted --interval 15
            STATUS="Deleted"
          else
            STATUS="Delete requested (async)"
          fi

          {
            echo "## Delete Resource Group"
            echo ""
            echo "- Resource group: $RESOURCE_GROUP_NAME"
            echo "- Status: $STATUS"
          } >> "$GITHUB_STEP_SUMMARY"