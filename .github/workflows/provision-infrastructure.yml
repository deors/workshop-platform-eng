name: Provision Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, staging, prod, all]
        required: true
        default: dev
      app_name:
        description: Application name (short, lowercase, no spaces)
        type: string
        required: true
      subscription_id:
        description: Azure Subscription ID
        type: string
        required: true
      container_image:
        description: "Container image reference (ignored in reconcile runs — Terraform's lifecycle keeps the image last set by CI/deploy)"
        type: string
        required: false
        default: "mcr.microsoft.com/appsvc/staticsite:latest"
      container_registry_url:
        description: Container registry URL (leave empty for public Docker Hub images; ignored in reconcile runs)
        type: string
        required: false
        default: ""
      azure_client_id:
        description: Client ID of the Azure service principal / managed identity used for OIDC login
        type: string
        required: true
      azure_tenant_id:
        description: Azure Tenant ID
        type: string
        required: true
      template_repo:
        description: "Template repo for the application source (owner/name). Created under the same org as <app_name>."
        type: string
        required: true
      ci_workflow_file:
        description: Filename of the CI workflow inside the application repo
        type: string
        required: false
        default: ci.yml

  repository_dispatch:
    types:
      - provision-infrastructure
      - update-infrastructure

# Permissions required for OIDC login and SARIF upload to Security tab.
permissions:
  id-token:        write
  contents:        read
  security-events: write

concurrency:
  group: provision-${{ github.event.inputs.app_name || github.event.client_payload.app_name }}
  cancel-in-progress: false   # never cancel an in-flight provision

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Resolve & validate inputs from either trigger source
  # ────────────────────────────────────────────────────────────────────────────
  resolve-inputs:
    name: Resolve inputs
    runs-on: ubuntu-latest
    outputs:
      environments:           ${{ steps.matrix.outputs.environments }}
      app_name:               ${{ steps.params.outputs.app_name }}
      subscription_id:        ${{ steps.params.outputs.subscription_id }}
      container_image:        ${{ steps.params.outputs.container_image }}
      container_registry_url: ${{ steps.params.outputs.container_registry_url }}
      azure_client_id:        ${{ steps.params.outputs.azure_client_id }}
      azure_tenant_id:        ${{ steps.params.outputs.azure_tenant_id }}
      tfstate_storage_account: ${{ steps.tfstate_names.outputs.storage_account }}
      tfstate_resource_group:  ${{ steps.tfstate_names.outputs.resource_group }}
      template_repo:           ${{ steps.params.outputs.template_repo }}
      ci_workflow_file:        ${{ steps.params.outputs.ci_workflow_file }}
      app_repo_full:           ${{ steps.params.outputs.app_repo_full }}

    steps:
      - name: Extract and validate parameters
        id: params
        env:
          # workflow_dispatch values
          WD_ENV:      ${{ github.event.inputs.environment }}
          WD_APP:      ${{ github.event.inputs.app_name }}
          WD_SUB:      ${{ github.event.inputs.subscription_id }}
          WD_IMAGE:    ${{ github.event.inputs.container_image }}
          WD_REGISTRY:   ${{ github.event.inputs.container_registry_url }}
          WD_CLIENT_ID:  ${{ github.event.inputs.azure_client_id }}
          WD_TENANT_ID:  ${{ github.event.inputs.azure_tenant_id }}
          WD_TEMPLATE:   ${{ github.event.inputs.template_repo }}
          WD_CI_FILE:    ${{ github.event.inputs.ci_workflow_file }}
          # repository_dispatch values (client_payload)
          RD_ENV:        ${{ github.event.client_payload.environment }}
          RD_APP:        ${{ github.event.client_payload.app_name }}
          RD_SUB:        ${{ github.event.client_payload.subscription_id }}
          RD_IMAGE:      ${{ github.event.client_payload.container_image }}
          RD_REGISTRY:   ${{ github.event.client_payload.container_registry_url }}
          RD_CLIENT_ID:  ${{ github.event.client_payload.azure_client_id }}
          RD_TENANT_ID:  ${{ github.event.client_payload.azure_tenant_id }}
          RD_TEMPLATE:   ${{ github.event.client_payload.template_repo }}
          RD_CI_FILE:    ${{ github.event.client_payload.ci_workflow_file }}
          OWNER:         ${{ github.repository_owner }}
        run: |
          APP_NAME="${WD_APP:-$RD_APP}"
          SUBSCRIPTION_ID="${WD_SUB:-$RD_SUB}"
          # container_image is optional. The placeholder is what Terraform
          # writes on the first apply; thereafter the lifecycle.ignore_changes
          # on site_config[0].application_stack means whatever CI/deploy
          # put there stays put. Reconcile runs therefore don't need a real
          # image value.
          CONTAINER_IMAGE="${WD_IMAGE:-${RD_IMAGE:-myregistry.azurecr.io/myapp:latest}}"
          CONTAINER_REGISTRY_URL="${WD_REGISTRY:-$RD_REGISTRY}"
          ENVIRONMENT="${WD_ENV:-$RD_ENV}"
          AZURE_CLIENT_ID="${WD_CLIENT_ID:-$RD_CLIENT_ID}"
          AZURE_TENANT_ID="${WD_TENANT_ID:-$RD_TENANT_ID}"
          TEMPLATE_REPO="${WD_TEMPLATE:-$RD_TEMPLATE}"
          CI_WORKFLOW_FILE="${WD_CI_FILE:-${RD_CI_FILE:-ci.yml}}"

          MISSING=()
          [[ -z "$APP_NAME"        ]] && MISSING+=(app_name)
          [[ -z "$SUBSCRIPTION_ID" ]] && MISSING+=(subscription_id)
          [[ -z "$ENVIRONMENT"     ]] && MISSING+=(environment)
          [[ -z "$AZURE_CLIENT_ID" ]] && MISSING+=(azure_client_id)
          [[ -z "$AZURE_TENANT_ID" ]] && MISSING+=(azure_tenant_id)
          [[ -z "$TEMPLATE_REPO"   ]] && MISSING+=(template_repo)
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Missing required parameters: ${MISSING[*]}"
            exit 1
          fi

          # Validate app_name: lowercase alphanumeric + hyphens only
          if ! [[ "$APP_NAME" =~ ^[a-z0-9][a-z0-9-]{1,20}[a-z0-9]$ ]]; then
            echo "::error::app_name must be 3–22 chars, lowercase alphanumeric and hyphens, no leading/trailing hyphen"
            exit 1
          fi

          # Note: subscription_id, azure_client_id, azure_tenant_id are GUIDs that
          # identify Azure resources/principals. They are not secrets in an OIDC flow
          # (security comes from the federated credential subject claim). They are
          # NOT masked here because GitHub Actions blanks masked values when they
          # flow through job outputs to downstream jobs.

          echo "app_name=$APP_NAME"                             >> "$GITHUB_OUTPUT"
          echo "subscription_id=$SUBSCRIPTION_ID"               >> "$GITHUB_OUTPUT"
          echo "container_image=$CONTAINER_IMAGE"               >> "$GITHUB_OUTPUT"
          echo "container_registry_url=$CONTAINER_REGISTRY_URL" >> "$GITHUB_OUTPUT"
          echo "environment=$ENVIRONMENT"                       >> "$GITHUB_OUTPUT"
          echo "azure_client_id=$AZURE_CLIENT_ID"               >> "$GITHUB_OUTPUT"
          echo "azure_tenant_id=$AZURE_TENANT_ID"               >> "$GITHUB_OUTPUT"
          echo "template_repo=$TEMPLATE_REPO"                   >> "$GITHUB_OUTPUT"
          echo "ci_workflow_file=$CI_WORKFLOW_FILE"             >> "$GITHUB_OUTPUT"
          echo "app_repo_full=${OWNER}/${APP_NAME}"             >> "$GITHUB_OUTPUT"

      - name: Derive tfstate resource names
        id: tfstate_names
        env:
          APP_NAME:        ${{ steps.params.outputs.app_name }}
          SUBSCRIPTION_ID: ${{ steps.params.outputs.subscription_id }}
        run: |
          # Must match the formula in scripts/bootstrap-tfstate.sh exactly
          APP_SHORT=$(echo "$APP_NAME"        | tr -d '-' | tr '[:upper:]' '[:lower:]' | cut -c1-12)
          SUB_SHORT=$(echo "$SUBSCRIPTION_ID" | tr -d '-'                               | cut -c1-8)
          echo "storage_account=sttf${APP_SHORT}${SUB_SHORT}" >> "$GITHUB_OUTPUT"
          echo "resource_group=rg-tfstate-${APP_NAME}"        >> "$GITHUB_OUTPUT"

      - name: Build environment matrix
        id: matrix
        env:
          ENVIRONMENT: ${{ steps.params.outputs.environment }}
        run: |
          if [[ "$ENVIRONMENT" == "all" ]]; then
            echo 'environments=["dev","staging","prod"]' >> "$GITHUB_OUTPUT"
          else
            echo "environments=[\"$ENVIRONMENT\"]" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        env:
          APP_NAME:    ${{ steps.params.outputs.app_name }}
          ENVIRONMENT: ${{ steps.params.outputs.environment }}
          IMAGE:       ${{ steps.params.outputs.container_image }}
          TRIGGER:     ${{ github.event_name }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Provision Infrastructure

          | Parameter   | Value         |
          |-------------|---------------|
          | Trigger     | \`$TRIGGER\`  |
          | App name    | \`$APP_NAME\` |
          | Environment | \`$ENVIRONMENT\` |
          | Image       | \`$IMAGE\`    |
          EOF

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Checkov – security and compliance scan, per target environment
  #    Per-env scoping lets us keep prod-strict baselines (zone redundancy, min
  #    instance count) while allowing dev/staging to run lighter footprints.
  # ────────────────────────────────────────────────────────────────────────────
  checkov:
    name: "Checkov · ${{ matrix.environment }}"
    needs: resolve-inputs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.resolve-inputs.outputs.environments) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory:             terraform/environments/${{ matrix.environment }}
          framework:             terraform
          # Prod uses the strict baseline; dev/staging use the relaxed config
          # that additionally skips CKV_AZURE_212 and CKV_AZURE_225.
          config_file: ${{ matrix.environment == 'prod' && '.checkov.yaml' || '.checkov.nonprod.yaml' }}
          output_format:         cli,sarif
          output_file_path:      console,checkov-results.sarif
          download_external_modules: false
          soft_fail:             false

      - name: Upload SARIF to GitHub Security tab
        if: always()   # upload even when checkov fails so findings are visible
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file:      checkov-results.sarif
          category:        checkov-terraform-${{ matrix.environment }}

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Terraform format check (once, not per-environment)
  # ────────────────────────────────────────────────────────────────────────────
  fmt:
    name: Terraform fmt check
    needs: resolve-inputs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.9"
          terraform_wrapper:  false

      - name: Check formatting
        run: terraform fmt -check -recursive terraform/

  # ────────────────────────────────────────────────────────────────────────────
  # 4. Bootstrap remote state storage (idempotent – safe to run every time).
  #    Delegates to the reusable bootstrap-tfstate.yml workflow so the same
  #    logic can be triggered standalone.
  # ────────────────────────────────────────────────────────────────────────────
  bootstrap-tfstate:
    name: Bootstrap tfstate storage
    needs: [resolve-inputs, checkov, fmt]
    uses: ./.github/workflows/bootstrap-tfstate.yml
    with:
      app_name:        ${{ needs.resolve-inputs.outputs.app_name }}
      subscription_id: ${{ needs.resolve-inputs.outputs.subscription_id }}
      azure_client_id: ${{ needs.resolve-inputs.outputs.azure_client_id }}
      azure_tenant_id: ${{ needs.resolve-inputs.outputs.azure_tenant_id }}

  # ────────────────────────────────────────────────────────────────────────────
  # 5. Terraform plan – one job per target environment, after scan passes
  # ────────────────────────────────────────────────────────────────────────────
  plan:
    name: "Plan · ${{ matrix.environment }}"
    needs: [resolve-inputs, checkov, fmt, bootstrap-tfstate]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # plan remaining envs even if one fails
      matrix:
        environment: ${{ fromJson(needs.resolve-inputs.outputs.environments) }}
    environment: ${{ matrix.environment }}   # enables GitHub environment protection rules

    # The azurerm backend and provider read ARM_* env vars for OIDC auth.
    # azure/login sets AZURE_* (different prefix); we surface ARM_* here so
    # `terraform init` (backend) and `terraform plan` (provider) can both
    # authenticate without --backend-config / provider-block boilerplate.
    env:
      ARM_USE_OIDC:        "true"
      # Tell the backend to use Azure AD against the blob endpoint, not shared
      # keys. The state SA is created with --allow-shared-key-access=false, so
      # without this the backend hits 403 KeyBasedAuthenticationNotPermitted
      # even though the OIDC token itself is valid.
      ARM_USE_AZUREAD:     "true"
      ARM_CLIENT_ID:       ${{ needs.resolve-inputs.outputs.azure_client_id }}
      ARM_TENANT_ID:       ${{ needs.resolve-inputs.outputs.azure_tenant_id }}
      ARM_SUBSCRIPTION_ID: ${{ needs.resolve-inputs.outputs.subscription_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id:       ${{ needs.resolve-inputs.outputs.azure_client_id }}
          tenant-id:       ${{ needs.resolve-inputs.outputs.azure_tenant_id }}
          subscription-id: ${{ needs.resolve-inputs.outputs.subscription_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.9"
          terraform_wrapper:  false

      - name: Generate tfvars
        working-directory: terraform/environments/${{ matrix.environment }}
        env:
          APP_NAME:               ${{ needs.resolve-inputs.outputs.app_name }}
          SUBSCRIPTION_ID:        ${{ needs.resolve-inputs.outputs.subscription_id }}
          CONTAINER_IMAGE:        ${{ needs.resolve-inputs.outputs.container_image }}
          CONTAINER_REGISTRY_URL: ${{ needs.resolve-inputs.outputs.container_registry_url }}
        run: |
          # Write tfvars using printf to avoid shell interpolation of HCL syntax
          printf 'subscription_id        = "%s"\n' "$SUBSCRIPTION_ID"        >  terraform.tfvars
          printf 'app_name               = "%s"\n' "$APP_NAME"               >> terraform.tfvars
          printf 'container_image        = "%s"\n' "$CONTAINER_IMAGE"        >> terraform.tfvars
          printf 'container_registry_url = "%s"\n' "$CONTAINER_REGISTRY_URL" >> terraform.tfvars

      - name: Terraform init
        working-directory: terraform/environments/${{ matrix.environment }}
        env:
          STORAGE_ACCOUNT: ${{ needs.resolve-inputs.outputs.tfstate_storage_account }}
          RESOURCE_GROUP:  ${{ needs.resolve-inputs.outputs.tfstate_resource_group }}
          ENVIRONMENT:     ${{ matrix.environment }}
        run: |
          terraform init \
            -input=false \
            -backend-config="resource_group_name=${RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${STORAGE_ACCOUNT}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${ENVIRONMENT}/terraform.tfstate" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform validate
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform validate

      - name: Terraform plan
        id: plan
        working-directory: terraform/environments/${{ matrix.environment }}
        run: |
          # -no-color: markdown code blocks in the step summary don't render
          # ANSI escapes; without this the captured output is unreadable.
          terraform plan \
            -input=false \
            -no-color \
            -out=tfplan \
            2>&1 | tee plan-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Write plan summary
        if: always()
        working-directory: terraform/environments/${{ matrix.environment }}
        env:
          APP_NAME:    ${{ needs.resolve-inputs.outputs.app_name }}
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          {
            echo "## Plan · \`$APP_NAME\` / \`$ENVIRONMENT\`"
            echo ""
            echo "<details><summary>Show plan output</summary>"
            echo ""
            echo '```'
            cat plan-output.txt
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name:              tfplan-${{ needs.resolve-inputs.outputs.app_name }}-${{ matrix.environment }}
          retention-days:    7
          if-no-files-found: error
          path: |
            terraform/environments/${{ matrix.environment }}/tfplan
            terraform/environments/${{ matrix.environment }}/plan-output.txt

  # ────────────────────────────────────────────────────────────────────────────
  # 6. Terraform apply – consume the plan artifact and provision per environment
  # ────────────────────────────────────────────────────────────────────────────
  apply:
    name: "Apply · ${{ matrix.environment }}"
    needs: [resolve-inputs, plan]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.resolve-inputs.outputs.environments) }}
    environment: ${{ matrix.environment }}

    env:
      ARM_USE_OIDC:        "true"
      ARM_USE_AZUREAD:     "true"
      ARM_CLIENT_ID:       ${{ needs.resolve-inputs.outputs.azure_client_id }}
      ARM_TENANT_ID:       ${{ needs.resolve-inputs.outputs.azure_tenant_id }}
      ARM_SUBSCRIPTION_ID: ${{ needs.resolve-inputs.outputs.subscription_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id:       ${{ needs.resolve-inputs.outputs.azure_client_id }}
          tenant-id:       ${{ needs.resolve-inputs.outputs.azure_tenant_id }}
          subscription-id: ${{ needs.resolve-inputs.outputs.subscription_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.9"
          terraform_wrapper:  false

      - name: Generate tfvars
        working-directory: terraform/environments/${{ matrix.environment }}
        env:
          APP_NAME:               ${{ needs.resolve-inputs.outputs.app_name }}
          SUBSCRIPTION_ID:        ${{ needs.resolve-inputs.outputs.subscription_id }}
          CONTAINER_IMAGE:        ${{ needs.resolve-inputs.outputs.container_image }}
          CONTAINER_REGISTRY_URL: ${{ needs.resolve-inputs.outputs.container_registry_url }}
        run: |
          printf 'subscription_id        = "%s"\n' "$SUBSCRIPTION_ID"        >  terraform.tfvars
          printf 'app_name               = "%s"\n' "$APP_NAME"               >> terraform.tfvars
          printf 'container_image        = "%s"\n' "$CONTAINER_IMAGE"        >> terraform.tfvars
          printf 'container_registry_url = "%s"\n' "$CONTAINER_REGISTRY_URL" >> terraform.tfvars

      - name: Terraform init
        working-directory: terraform/environments/${{ matrix.environment }}
        env:
          STORAGE_ACCOUNT: ${{ needs.resolve-inputs.outputs.tfstate_storage_account }}
          RESOURCE_GROUP:  ${{ needs.resolve-inputs.outputs.tfstate_resource_group }}
          ENVIRONMENT:     ${{ matrix.environment }}
        run: |
          terraform init \
            -input=false \
            -backend-config="resource_group_name=${RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${STORAGE_ACCOUNT}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${ENVIRONMENT}/terraform.tfstate" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true"

      - name: Download tfplan
        uses: actions/download-artifact@v8
        with:
          name: tfplan-${{ needs.resolve-inputs.outputs.app_name }}-${{ matrix.environment }}
          path: terraform/environments/${{ matrix.environment }}

      - name: Terraform apply
        working-directory: terraform/environments/${{ matrix.environment }}
        run: |
          terraform apply -input=false -no-color tfplan 2>&1 | tee apply-output.txt

      - name: Write apply summary
        if: always()
        working-directory: terraform/environments/${{ matrix.environment }}
        env:
          APP_NAME:    ${{ needs.resolve-inputs.outputs.app_name }}
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          {
            echo "## Apply · \`$APP_NAME\` / \`$ENVIRONMENT\`"
            echo ""
            echo "<details><summary>Show apply output</summary>"
            echo ""
            echo '```'
            cat apply-output.txt
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────────────────────────────
  # 7. Verify – delegates to the reusable verify-infrastructure.yml workflow.
  #    The reusable workflow owns the GitHub Environment binding and the
  #    OIDC login, so federated credential matching stays consistent whether
  #    verify runs from here or is triggered standalone.
  # ────────────────────────────────────────────────────────────────────────────
  verify:
    name: "Verify · ${{ matrix.environment }}"
    needs: [resolve-inputs, apply]
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.resolve-inputs.outputs.environments) }}
    uses: ./.github/workflows/verify-infrastructure.yml
    with:
      app_name:        ${{ needs.resolve-inputs.outputs.app_name }}
      environment:     ${{ matrix.environment }}
      subscription_id: ${{ needs.resolve-inputs.outputs.subscription_id }}
      azure_client_id: ${{ needs.resolve-inputs.outputs.azure_client_id }}
      azure_tenant_id: ${{ needs.resolve-inputs.outputs.azure_tenant_id }}

  # ────────────────────────────────────────────────────────────────────────────
  # 8. Application repository – create from template (idempotent).
  #
  #    The workflow can be re-invoked any number of times — typically once per
  #    environment as it is rolled out. On re-runs the repo already exists and
  #    creation is skipped, but environment configuration and federated
  #    credential registration still run (they're idempotent). The bootstrap
  #    issue, CI observation and final comment are only emitted on first
  #    creation.
  #
  #    Requires a PAT with `repo` + `workflow` + `admin:repo_hook` scopes (or a
  #    GitHub App installation token) exposed as the `GH_PAT` repository secret.
  #    The default GITHUB_TOKEN is scoped to this repo only and cannot create
  #    repositories or write to other repos' environments/variables.
  # ────────────────────────────────────────────────────────────────────────────
  create-app-repo:
    name: Create application repo
    needs: [resolve-inputs, verify]
    runs-on: ubuntu-latest
    outputs:
      repo_existed: ${{ steps.create.outputs.repo_existed }}
      repo_full:    ${{ needs.resolve-inputs.outputs.app_repo_full }}
      created_at:   ${{ steps.create.outputs.created_at }}
    steps:
      - name: Create from template
        id: create
        env:
          GH_TOKEN:  ${{ secrets.GH_PAT }}
          OWNER:     ${{ github.repository_owner }}
          APP_NAME:  ${{ needs.resolve-inputs.outputs.app_name }}
          REPO_FULL: ${{ needs.resolve-inputs.outputs.app_repo_full }}
          TEMPLATE:  ${{ needs.resolve-inputs.outputs.template_repo }}
        run: |
          if gh api "repos/${REPO_FULL}" --silent 2>/dev/null; then
            echo "Repository ${REPO_FULL} already exists — skipping creation"
            echo "repo_existed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Capture the wall-clock just before the create call so we can later
          # find the auto-triggered CI run (template generation enqueues a
          # workflow run on the first commit it pushes to `main`).
          CREATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "created_at=${CREATED_AT}" >> "$GITHUB_OUTPUT"

          echo "Creating ${REPO_FULL} from template ${TEMPLATE}…"
          gh api -X POST "repos/${TEMPLATE}/generate" \
            -f "owner=${OWNER}" \
            -f "name=${APP_NAME}" \
            -f "description=Application repository for ${APP_NAME} (provisioned by platform-eng)" \
            -F "private=true" \
            -F "include_all_branches=false"

          # The "generate" endpoint is async — wait for the repo to be queryable.
          for _ in $(seq 1 30); do
            gh api "repos/${REPO_FULL}" --silent 2>/dev/null && break
            sleep 2
          done

          echo "repo_existed=false" >> "$GITHUB_OUTPUT"

      # Grant the default GITHUB_TOKEN write permission to GHCR (and other
      # in-repo writes) so the template's CI workflow can `docker push` to
      # ghcr.io/<owner>/<repo> using the workflow token. New repos default to
      # `read` only, which causes `denied: permission_denied: write_package`.
      # Idempotent (PUT) — safe to run on every invocation.
      - name: Allow workflows to write packages
        env:
          GH_TOKEN:  ${{ secrets.GH_PAT }}
          REPO_FULL: ${{ needs.resolve-inputs.outputs.app_repo_full }}
        run: |
          gh api --method PUT "repos/${REPO_FULL}/actions/permissions/workflow" \
            -f default_workflow_permissions=write \
            -F can_approve_pull_request_reviews=false \
            --silent
          echo "Default workflow permissions on ${REPO_FULL} set to 'write'"

      - name: Summary
        env:
          REPO_FULL: ${{ needs.resolve-inputs.outputs.app_repo_full }}
          EXISTED:   ${{ steps.create.outputs.repo_existed }}
        run: |
          {
            echo "## Application repository"
            if [[ "$EXISTED" == "true" ]]; then
              echo ""
              echo "[\`$REPO_FULL\`](https://github.com/$REPO_FULL) already existed — environment configuration will be reconciled, CI observation skipped."
            else
              echo ""
              echo "Created [\`$REPO_FULL\`](https://github.com/$REPO_FULL) from template."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────────────────────────────
  # 9. Per-run tracking issue. Opened on every invocation (not just first
  #    creation) — each run gets its own issue describing which environments
  #    were touched and whether they were created or refreshed (parsed from
  #    the plan artifact). On first creation the body also mentions the
  #    auto-triggered CI run; subsequent runs omit that section.
  # ────────────────────────────────────────────────────────────────────────────
  create-run-issue:
    name: Create run issue
    needs: [resolve-inputs, create-app-repo, apply, verify]
    runs-on: ubuntu-latest
    outputs:
      issue_number:    ${{ steps.issue.outputs.number }}
      issue_url:       ${{ steps.issue.outputs.url }}
      run_kind:        ${{ steps.body.outputs.run_kind }}
      total_added:     ${{ steps.body.outputs.total_added }}
      total_changed:   ${{ steps.body.outputs.total_changed }}
      total_destroyed: ${{ steps.body.outputs.total_destroyed }}
      total_passed:    ${{ steps.body.outputs.total_passed }}
      total_failed:    ${{ steps.body.outputs.total_failed }}
    steps:
      # One download step per env, gated by membership in the resolved matrix.
      # Using `name:` (not `pattern:`) gives deterministic placement: contents
      # of each artifact land directly under `path:`, so plan-output.txt is
      # always at plans/<env>/plan-output.txt regardless of how many envs are
      # in this run. This sidesteps the v8 quirk where `pattern:` with a
      # single match flattens contents instead of creating an artifact-name
      # subdirectory.
      - name: Download plan artifact (dev)
        if: contains(fromJson(needs.resolve-inputs.outputs.environments), 'dev')
        uses: actions/download-artifact@v8
        with:
          name: tfplan-${{ needs.resolve-inputs.outputs.app_name }}-dev
          path: plans/dev

      - name: Download plan artifact (staging)
        if: contains(fromJson(needs.resolve-inputs.outputs.environments), 'staging')
        uses: actions/download-artifact@v8
        with:
          name: tfplan-${{ needs.resolve-inputs.outputs.app_name }}-staging
          path: plans/staging

      - name: Download plan artifact (prod)
        if: contains(fromJson(needs.resolve-inputs.outputs.environments), 'prod')
        uses: actions/download-artifact@v8
        with:
          name: tfplan-${{ needs.resolve-inputs.outputs.app_name }}-prod
          path: plans/prod

      # Verify summary artifacts — same per-env pattern as plans. Each contains
      # a tiny key=value file with passed/failed counts from verify-infra.sh.
      - name: Download verify summary (dev)
        if: contains(fromJson(needs.resolve-inputs.outputs.environments), 'dev')
        uses: actions/download-artifact@v8
        with:
          name: verify-dev
          path: verify/dev

      - name: Download verify summary (staging)
        if: contains(fromJson(needs.resolve-inputs.outputs.environments), 'staging')
        uses: actions/download-artifact@v8
        with:
          name: verify-staging
          path: verify/staging

      - name: Download verify summary (prod)
        if: contains(fromJson(needs.resolve-inputs.outputs.environments), 'prod')
        uses: actions/download-artifact@v8
        with:
          name: verify-prod
          path: verify/prod

      - name: Inspect downloaded artifacts
        run: |
          echo "::group::plans/ tree"
          find plans -maxdepth 3 -print | head -50
          echo "::endgroup::"
          echo "::group::verify/ tree"
          find verify -maxdepth 3 -print | head -50
          echo "::endgroup::"

      - name: Build issue body
        id: body
        env:
          ENVIRONMENTS_JSON: ${{ needs.resolve-inputs.outputs.environments }}
          APP_NAME:          ${{ needs.resolve-inputs.outputs.app_name }}
          TEMPLATE:          ${{ needs.resolve-inputs.outputs.template_repo }}
          REPO_EXISTED:      ${{ needs.create-app-repo.outputs.repo_existed }}
          PROVISION_URL:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          ENVS=$(jq -r '.[]' <<<"$ENVIRONMENTS_JSON")

          # Render comma-joined env list for the title and intro.
          ENV_LIST=$(echo "$ENVS" | paste -sd, - | sed 's/,/, /g')

          # Per-env plan parsing + cross-env aggregation. The download steps
          # above put files at predictable paths:
          #   plans/<env>/plan-output.txt
          #   verify/<env>/verify-summary.txt
          STATUSES=""
          TOTAL_ADD=0; TOTAL_CHANGE=0; TOTAL_DESTROY=0
          TOTAL_PASS=0; TOTAL_FAIL=0
          for env in $ENVS; do
            PLAN_FILE="plans/${env}/plan-output.txt"
            if [[ ! -f "$PLAN_FILE" ]]; then
              STATUSES+="- \`${env}\` — plan output not available"$'\n'
            elif grep -qE "^No changes\." "$PLAN_FILE"; then
              STATUSES+="- \`${env}\` — **no changes** (already up-to-date)"$'\n'
            else
              PLAN_LINE=$(grep -E "^Plan: " "$PLAN_FILE" | tail -1 || true)
              ADD=$(   grep -oE "[0-9]+ to add"     <<<"$PLAN_LINE" | grep -oE "^[0-9]+" || echo 0)
              CHANGE=$(grep -oE "[0-9]+ to change"  <<<"$PLAN_LINE" | grep -oE "^[0-9]+" || echo 0)
              DESTROY=$(grep -oE "[0-9]+ to destroy" <<<"$PLAN_LINE" | grep -oE "^[0-9]+" || echo 0)
              TOTAL_ADD=$((TOTAL_ADD + ADD))
              TOTAL_CHANGE=$((TOTAL_CHANGE + CHANGE))
              TOTAL_DESTROY=$((TOTAL_DESTROY + DESTROY))
              if   [[ "$ADD" -gt 0 && "$CHANGE" -eq 0 && "$DESTROY" -eq 0 ]]; then
                STATUSES+="- \`${env}\` — **created** (${ADD} resources added)"$'\n'
              elif [[ "$ADD" -eq 0 && "$CHANGE" -gt 0 && "$DESTROY" -eq 0 ]]; then
                STATUSES+="- \`${env}\` — **refreshed** (${CHANGE} resources updated)"$'\n'
              elif [[ "$ADD" -eq 0 && "$CHANGE" -eq 0 && "$DESTROY" -eq 0 ]]; then
                STATUSES+="- \`${env}\` — **no changes**"$'\n'
              else
                STATUSES+="- \`${env}\` — applied (${ADD} added, ${CHANGE} changed, ${DESTROY} destroyed)"$'\n'
              fi
            fi

            # Verify summary (passed=N\nfailed=N). Missing file → counts stay
            # at zero for that env, which surfaces as 0/0 in the totals row.
            VERIFY_FILE="verify/${env}/verify-summary.txt"
            if [[ -f "$VERIFY_FILE" ]]; then
              ENV_PASS=$(grep -oE '^passed=[0-9]+' "$VERIFY_FILE" | cut -d= -f2 || echo 0)
              ENV_FAIL=$(grep -oE '^failed=[0-9]+' "$VERIFY_FILE" | cut -d= -f2 || echo 0)
              TOTAL_PASS=$((TOTAL_PASS + ENV_PASS))
              TOTAL_FAIL=$((TOTAL_FAIL + ENV_FAIL))
            fi
          done

          # Surface aggregates as job outputs for finalize to render.
          {
            echo "total_added=$TOTAL_ADD"
            echo "total_changed=$TOTAL_CHANGE"
            echo "total_destroyed=$TOTAL_DESTROY"
            echo "total_passed=$TOTAL_PASS"
            echo "total_failed=$TOTAL_FAIL"
          } >> "$GITHUB_OUTPUT"

          # Three-way classification used for both the issue title and the
          # repo line in the body:
          #   - bootstrap : repo created in this run
          #   - provision : repo already existed, new env(s) created (added > 0)
          #   - reconcile : repo and env(s) already existed, only updates / no-op
          if [[ "$REPO_EXISTED" == "false" ]]; then
            RUN_KIND="bootstrap"
            REPO_LINE="Repository created from template [\`${TEMPLATE}\`](https://github.com/${TEMPLATE})."
            TITLE_PREFIX="Bootstrap run"
          elif [[ "$TOTAL_ADD" -gt 0 ]]; then
            RUN_KIND="provision"
            REPO_LINE="Repository already exists — provisioning new environment(s) on it."
            TITLE_PREFIX="Provision run"
          else
            RUN_KIND="reconcile"
            REPO_LINE="Repository already exists — reconciling existing environment(s)."
            TITLE_PREFIX="Reconcile run"
          fi

          {
            echo "# ${TITLE_PREFIX} — \`${APP_NAME}\` / ${ENV_LIST}"
            echo
            echo "Triggered by [#${{ github.run_id }}](${PROVISION_URL})."
            echo
            echo "## Repository"
            echo
            echo "${REPO_LINE}"
            echo
            echo "## Environment status"
            echo
            printf '%s' "${STATUSES}"
            if [[ "$RUN_KIND" == "bootstrap" ]]; then
              echo
              echo "## Application CI"
              echo
              echo "Template generation auto-triggered the CI workflow on the new repo. It builds, tests, and (if the dev environment is in this run) deploys to dev. A summary comment will be appended once that run finishes."
            fi
          } > /tmp/issue-body.md

          # Title and run kind for downstream jobs.
          echo "title=${TITLE_PREFIX} — ${ENV_LIST}" >> "$GITHUB_OUTPUT"
          echo "run_kind=${RUN_KIND}"                >> "$GITHUB_OUTPUT"

      - name: Open issue
        id: issue
        env:
          GH_TOKEN:  ${{ secrets.GH_PAT }}
          REPO_FULL: ${{ needs.create-app-repo.outputs.repo_full }}
          TITLE:     ${{ steps.body.outputs.title }}
        run: |
          URL=$(gh issue create -R "$REPO_FULL" \
            --title "$TITLE" \
            --body-file /tmp/issue-body.md)
          NUMBER="${URL##*/}"
          echo "url=$URL"        >> "$GITHUB_OUTPUT"
          echo "number=$NUMBER"  >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────────────────
  # 10. Configure GitHub Environments and variables — one job per environment.
  #     Always runs (idempotent: PUT for the env, PATCH→POST for each variable)
  #     so re-invocations can roll out additional envs to an existing app repo.
  # ────────────────────────────────────────────────────────────────────────────
  configure-environments:
    name: "Configure env · ${{ matrix.environment }}"
    needs: [resolve-inputs, create-app-repo]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.resolve-inputs.outputs.environments) }}
    steps:
      - name: Create environment and set variables
        env:
          GH_TOKEN:  ${{ secrets.GH_PAT }}
          REPO_FULL: ${{ needs.create-app-repo.outputs.repo_full }}
          ENV:       ${{ matrix.environment }}
          APP_NAME:  ${{ needs.resolve-inputs.outputs.app_name }}
          SUB:       ${{ needs.resolve-inputs.outputs.subscription_id }}
          CID:       ${{ needs.resolve-inputs.outputs.azure_client_id }}
          TID:       ${{ needs.resolve-inputs.outputs.azure_tenant_id }}
          REGISTRY:  ${{ needs.resolve-inputs.outputs.container_registry_url }}
        run: |
          # 1. Create the environment (PUT is idempotent — 200 if it already exists).
          gh api -X PUT "repos/${REPO_FULL}/environments/${ENV}" --silent

          # 2. Set per-environment variables. Try update first, fall back to create.
          set_var() {
            local name="$1" value="$2"
            if ! gh api -X PATCH "repos/${REPO_FULL}/environments/${ENV}/variables/${name}" \
                   -f "name=${name}" -f "value=${value}" --silent 2>/dev/null; then
              gh api -X POST "repos/${REPO_FULL}/environments/${ENV}/variables" \
                -f "name=${name}" -f "value=${value}" --silent
            fi
          }

          set_var AZURE_SUBSCRIPTION_ID "$SUB"
          set_var AZURE_CLIENT_ID       "$CID"
          set_var AZURE_TENANT_ID       "$TID"
          set_var AZURE_RESOURCE_GROUP  "rg-${APP_NAME}-${ENV}"
          set_var AZURE_WEBAPP_NAME     "app-${APP_NAME}-${ENV}"
          [[ -n "$REGISTRY" ]] && set_var CONTAINER_REGISTRY_URL "$REGISTRY"

          echo "Environment '${ENV}' configured on ${REPO_FULL}"

  # ────────────────────────────────────────────────────────────────────────────
  # 11. Register federated credentials on the platform-eng App Registration so
  #      OIDC tokens issued for the new app repo are accepted by Entra ID.
  #      Without these, deploy.yml in the new repo fails on `azure/login` with
  #      AADSTS70021 ("No matching federated identity record found").
  #      Always runs (idempotent: skips if the subject already has a
  #      credential) so re-invocations can register additional environments.
  #
  #      Prerequisite: the SP itself must be an Owner of its own App
  #      Registration AND hold Application.ReadWrite.OwnedBy on Microsoft
  #      Graph (admin consent) to manage its own federated credentials.
  #      See docs/SETUP.md step 5.
  # ────────────────────────────────────────────────────────────────────────────
  configure-federated-credentials:
    name: "Federated credential · ${{ matrix.environment }}"
    needs: [resolve-inputs, create-app-repo]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.resolve-inputs.outputs.environments) }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id:       ${{ needs.resolve-inputs.outputs.azure_client_id }}
          tenant-id:       ${{ needs.resolve-inputs.outputs.azure_tenant_id }}
          subscription-id: ${{ needs.resolve-inputs.outputs.subscription_id }}

      - name: Register federated credential
        env:
          APP_ID:    ${{ needs.resolve-inputs.outputs.azure_client_id }}
          REPO_FULL: ${{ needs.create-app-repo.outputs.repo_full }}
          ENV:       ${{ matrix.environment }}
        run: |
          SUBJECT="repo:${REPO_FULL}:environment:${ENV}"

          # Idempotent: skip if a credential with this exact subject already exists.
          EXISTING=$(az ad app federated-credential list --id "$APP_ID" \
            --query "[?subject=='${SUBJECT}'].id | [0]" -o tsv 2>/dev/null || true)
          if [[ -n "$EXISTING" ]]; then
            echo "Federated credential for '${SUBJECT}' already exists — skipping"
            exit 0
          fi

          # Name: alphanumeric + hyphens, ≤120 chars. owner-app-env is unique.
          NAME="${REPO_FULL//\//-}-${ENV}"

          az ad app federated-credential create --id "$APP_ID" --parameters @<(cat <<JSON
          {
            "name":      "${NAME}",
            "issuer":    "https://token.actions.githubusercontent.com",
            "subject":   "${SUBJECT}",
            "audiences": ["api://AzureADTokenExchange"]
          }
          JSON
          )
          echo "Registered federated credential '${NAME}' for subject '${SUBJECT}'"

  # ────────────────────────────────────────────────────────────────────────────
  # 12. Observe the CI run that template-generation auto-triggered.
  #
  #     When a repo is created from a template, GitHub pushes the initial
  #     commit to `main` and any `on: push` workflows fire automatically. So
  #     we don't dispatch CI ourselves — we just find that auto-run, watch it
  #     to completion, and propagate its conclusion as this job's status.
  #
  #     Contract with the template repo: ci.yml runs build/test AND calls the
  #     dev-deploy job as a reusable workflow inside the same run. A single
  #     `success` conclusion means "build + test + dev deploy all passed".
  #
  #     Skipped on re-runs: the auto-trigger only happens at creation time.
  # ────────────────────────────────────────────────────────────────────────────
  observe-ci:
    name: Observe CI in app repo
    needs: [resolve-inputs, create-app-repo, configure-environments, configure-federated-credentials]
    if: needs.create-app-repo.outputs.repo_existed == 'false'
    runs-on: ubuntu-latest
    outputs:
      ci_run_id:     ${{ steps.ci.outputs.ci_run_id }}
      ci_run_url:    ${{ steps.ci.outputs.ci_run_url }}
      ci_conclusion: ${{ steps.ci.outputs.ci_conclusion }}
    steps:
      - name: Checkout (for helper script)
        uses: actions/checkout@v5

      - name: Watch CI run (build + test + dev deploy)
        id: ci
        env:
          GH_TOKEN:      ${{ secrets.GH_PAT }}
          REPO_FULL:     ${{ needs.create-app-repo.outputs.repo_full }}
          WORKFLOW_FILE: ${{ needs.resolve-inputs.outputs.ci_workflow_file }}
          SINCE:         ${{ needs.create-app-repo.outputs.created_at }}
        run: |
          bash scripts/watch-run.sh \
            --repo        "$REPO_FULL" \
            --workflow    "$WORKFLOW_FILE" \
            --since       "$SINCE" \
            --output-key  ci \
            --timeout-min 20

      # watch-run.sh always exits 0 (it reports the conclusion via outputs).
      # Translate a non-success conclusion into a job failure here so the
      # platform run reflects reality.
      - name: Fail on non-success conclusion
        env:
          CI_CONCLUSION: ${{ steps.ci.outputs.ci_conclusion }}
          CI_URL:        ${{ steps.ci.outputs.ci_run_url }}
        run: |
          if [[ "$CI_CONCLUSION" != "success" ]]; then
            echo "::error::CI run concluded as '${CI_CONCLUSION}' — see ${CI_URL:-(no URL)}"
            exit 1
          fi
          echo "CI succeeded: $CI_URL"

  # ────────────────────────────────────────────────────────────────────────────
  # 13. Final summary + comment on the bootstrap issue.
  # ────────────────────────────────────────────────────────────────────────────
  finalize:
    name: Summarize and comment
    needs: [resolve-inputs, create-app-repo, create-run-issue, observe-ci]
    # Always runs (with always()), regardless of whether observe-ci was
    # skipped because the repo already existed. Reconcile runs still need
    # their own summary comment on the per-run issue.
    if: always() && needs.create-run-issue.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Build summary and post issue comment
        env:
          GH_TOKEN:      ${{ secrets.GH_PAT }}
          REPO_FULL:     ${{ needs.create-app-repo.outputs.repo_full }}
          ISSUE_NUMBER:  ${{ needs.create-run-issue.outputs.issue_number }}
          ISSUE_URL:     ${{ needs.create-run-issue.outputs.issue_url }}
          RUN_KIND:      ${{ needs.create-run-issue.outputs.run_kind }}
          PROVISION_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CI_URL:        ${{ needs.observe-ci.outputs.ci_run_url }}
          CI_CONCLUSION: ${{ needs.observe-ci.outputs.ci_conclusion }}
          ADD:           ${{ needs.create-run-issue.outputs.total_added }}
          CHANGE:        ${{ needs.create-run-issue.outputs.total_changed }}
          DESTROY:       ${{ needs.create-run-issue.outputs.total_destroyed }}
          PASSED:        ${{ needs.create-run-issue.outputs.total_passed }}
          FAILED:        ${{ needs.create-run-issue.outputs.total_failed }}
        run: |
          fmt() {
            local url="$1" status="$2"
            if [[ -n "$url" ]]; then
              echo "[\`$status\`]($url)"
            else
              echo "\`${status:-not run}\`"
            fi
          }

          # Three-way classification driven by create-run-issue's RUN_KIND:
          #   - bootstrap : new repo + new env(s); CI auto-triggered.
          #   - provision : existing repo + at least one new env; no CI.
          #   - reconcile : existing repo + only updates / no-ops; no CI.
          # Single-line strings: hard line breaks become literal newlines in
          # the rendered Markdown and cause mid-sentence wrapping.
          PROV_ROW="| Provisioning                     | [#${{ github.run_id }}]($PROVISION_URL) |"
          RES_ROW="| Resources changed                | + ${ADD:-0} · ~ ${CHANGE:-0} · - ${DESTROY:-0} |"
          TEST_ROW="| Verification tests               | passed ${PASSED:-0} · failed ${FAILED:-0} |"

          case "$RUN_KIND" in
            bootstrap)
              HEADING="Bootstrap run summary"
              CI_ROW="| CI + dev deploy (app repo)       | $(fmt "$CI_URL" "${CI_CONCLUSION:-skipped}") |"
              ROWS=$(printf '%s\n%s\n%s\n%s' "$PROV_ROW" "$CI_ROW" "$RES_ROW" "$TEST_ROW")
              if [[ "$CI_CONCLUSION" == "success" ]]; then
                CLOSING="The application repository is now ready for development. Merge the template README updates and start iterating — every push to \`main\` will run CI and (on success) deploy to dev."
              else
                CI_LINK="${CI_URL:-the CI run}"
                CLOSING="⚠️ The CI run did not succeed (conclusion: \`${CI_CONCLUSION:-unknown}\`). Investigate ${CI_LINK} and fix the failures before iterating on the application — pushes to \`main\` will keep failing until the issue is resolved. Re-run CI from the app repo's Actions tab once fixed; this platform run does not need to be re-invoked."
              fi
              ;;
            provision)
              HEADING="Provision run summary"
              ROWS=$(printf '%s\n%s\n%s' "$PROV_ROW" "$RES_ROW" "$TEST_ROW")
              CLOSING="New environment(s) provisioned on the existing application repository. Other environments and any application instances already deployed elsewhere were not modified. To deploy the application to the new environment(s), trigger the CI workflow from the app repo's Actions tab."
              ;;
            reconcile|*)
              HEADING="Reconcile run summary"
              ROWS=$(printf '%s\n%s\n%s' "$PROV_ROW" "$RES_ROW" "$TEST_ROW")
              CLOSING="Existing environment(s) reconciled — no new resources were added. Any deployed application image is preserved (Terraform's lifecycle ignores changes to the App Service container configuration after the initial create). If you need a fresh deploy, run the CI workflow from the app repo's Actions tab."
              ;;
          esac

          BODY=$(cat <<MARKDOWN
          ## ${HEADING}

          | Stage                            | Result |
          |----------------------------------|--------|
          ${ROWS}

          ${CLOSING}
          MARKDOWN
          )

          # Step summary on the platform side
          echo "$BODY" >> "$GITHUB_STEP_SUMMARY"
          echo ""      >> "$GITHUB_STEP_SUMMARY"
          [[ -n "$ISSUE_URL" ]] && echo "Run issue: $ISSUE_URL" >> "$GITHUB_STEP_SUMMARY"

          # Comment on the per-run issue in the app repo
          if [[ -n "$ISSUE_NUMBER" ]]; then
            gh issue comment "$ISSUE_NUMBER" -R "$REPO_FULL" --body "$BODY"
          fi
