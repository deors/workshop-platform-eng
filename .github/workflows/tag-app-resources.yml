name: Tag Application Resources

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: Application name (short, lowercase, no spaces)
        type: string
        required: true
      azure_tenant_id:
        description: Azure Tenant ID
        type: string
        required: true
      azure_subscription_id:
        description: Azure Subscription ID
        type: string
        required: true
      azure_client_id:
        description: Client ID of the Azure service principal / managed identity used for OIDC login
        type: string
        required: true
      tags_json:
        description: 'JSON object of tags to apply to every resource, e.g. {"tag1":"value1","tag2":"value2","tag3":"value3"}'
        type: string
        required: true
      dry_run:
        description: Preview scope without writing any tags
        type: boolean
        required: false
        default: false

# Permissions required for OIDC login.
permissions:
  id-token: write
  contents: read

concurrency:
  group: tag-resources-${{ github.event.inputs.app_name }}
  cancel-in-progress: false   # never cancel an in-flight tagging run

jobs:
  tag-resources:
    name: Tag resources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate inputs
        env:
          APP_NAME:  ${{ inputs.app_name }}
          TAGS_JSON: ${{ inputs.tags_json }}
        run: |
          set -euo pipefail

          if [[ -z "$APP_NAME" ]]; then
            echo "::error::app_name is required"
            exit 1
          fi
          if ! [[ "$APP_NAME" =~ ^[a-z0-9][a-z0-9-]{1,20}[a-z0-9]$ ]]; then
            echo "::error::app_name must be 3–22 chars, lowercase alphanumeric and hyphens, no leading/trailing hyphen"
            exit 1
          fi
          if ! echo "$TAGS_JSON" | jq -e 'type == "object"' >/dev/null 2>&1; then
            echo "::error::tags_json must be a valid JSON object, e.g. {\"key\":\"value\"}"
            exit 1
          fi
          TAG_COUNT=$(echo "$TAGS_JSON" | jq 'length')
          if [[ "$TAG_COUNT" -eq 0 ]]; then
            echo "::error::tags_json must contain at least one key"
            exit 1
          fi
          echo "Validated: app_name='$APP_NAME', tags=$TAG_COUNT"

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          tenant-id:       ${{ inputs.azure_tenant_id }}
          subscription-id: ${{ inputs.azure_subscription_id }}
          client-id:       ${{ inputs.azure_client_id }}

      - name: Tag resources
        env:
          APP_NAME:              ${{ inputs.app_name }}
          AZURE_TENANT_ID:       ${{ inputs.azure_tenant_id }}
          AZURE_SUBSCRIPTION_ID: ${{ inputs.azure_subscription_id }}
          AZURE_CLIENT_ID:       ${{ inputs.azure_client_id }}
          TAGS_JSON:             ${{ inputs.tags_json }}
          DRYRUN:                ${{ inputs.dry_run }}
        run: bash scripts/tag-app-resources.sh

      - name: Summary
        if: always()
        env:
          APP_NAME:  ${{ inputs.app_name }}
          TAGS_JSON: ${{ inputs.tags_json }}
          DRY_RUN:   ${{ inputs.dry_run }}
        run: |
          TAG_ROWS=$(echo "$TAGS_JSON" | jq -r 'to_entries[] | "| `\(.key)` | `\(.value)` |"' 2>/dev/null \
            || echo "| _(invalid JSON)_ |  |")
          {
            echo "## Tag Application Resources"
            echo ""
            echo "| Parameter | Value |"
            echo "|-----------|-------|"
            echo "| App name  | \`$APP_NAME\` |"
            echo "| Dry run   | \`$DRY_RUN\` |"
            echo ""
            echo "### Tags"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "$TAG_ROWS"
          } >> "$GITHUB_STEP_SUMMARY"
